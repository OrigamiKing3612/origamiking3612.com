name: Build site
on:
    push:
        branches-ignore:
            - master
    workflow_dispatch:
permissions:
    contents: read
    pages: write
    id-token: write
concurrency:
    group: "pages"
    cancel-in-progress: false
jobs:
    build:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4
            - uses: voidzero-dev/setup-vp@v1
              with:
                  node-version: "25"
                  cache: true
            - run: vp install
            - run: vp run build
            - run: vp check
